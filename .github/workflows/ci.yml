name: ci
on: [push, pull_request]
jobs:
  go-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-go@v5
        with: { go-version: '1.25.5' }
      - run: go mod download
      - run: go build ./cmd/... ./internal/... ./pkg/...
      - run: go vet ./...
      - run: go test ./...
      - run: gofmt -l . | (! grep .)
        # gofmt -l prints unformatted files; fail if any.

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/peacock-builder/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm run build
